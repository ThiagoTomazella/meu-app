<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Cadastro de Usuário</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Novo Usuário</ion-card-title>
      <ion-card-subtitle>Informe os dados</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label>Nome:</ion-label>
        <ion-input placeholder="Digite seu nome:"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label>Idade:</ion-label>
        <ion-input type="number" placeholder="Digite a sua idade:"></ion-input>
      </ion-item>
      <ion-button expand="block">Cadastrar Usuário</ion-button>
      <ion-button expand="block">Limpar Campos</ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
